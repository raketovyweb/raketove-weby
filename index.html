<!DOCTYPE html>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>MEGAFITKO</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap');
        
        :root {
            /* Zamezení horizontálnímu skrolování na úrovni kořene */
            overflow: hidden;
        }

        body { 
            background: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif;
            /* Uzamčení proti posunu a zoomu */
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none; /* Úplně zakáže gesta zoomování prsty */
            display: flex;
            flex-direction: column;
        }

        .gym-font { font-family: 'Orbitron', sans-serif; }

        .glass { 
            background: rgba(20, 20, 20, 0.9); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* Úprava velikosti pro "odzoomovaný" pocit - vše je kompaktnější */
        .container-box {
            transform: scale(0.9); /* Celou kartu mírně zmenšíme, aby vypadala elegantněji */
        }

        input {
            appearance: none;
            font-size: 16px !important; /* Prevence auto-zoomu Safari */
        }
    </style>
</head>
<body>

    <header class="p-4 text-center">
        <span class="gym-font font-black tracking-widest text-lg uppercase italic text-red-500">Mega<span class="text-white">Fitko</span></span>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">
        
        <div id="login-screen" class="glass p-6 rounded-2xl w-full max-w-[300px] container-box">
            <h1 class="gym-font text-lg font-black mb-1 text-center uppercase tracking-tighter">Člen</h1>
            <p class="text-slate-500 text-center mb-6 text-[10px] uppercase tracking-widest text-red-500 font-bold italic">Systém aktivní</p>
            
            <input type="password" id="password" pattern="\d*" inputmode="numeric" placeholder="PIN" 
                class="w-full p-3 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-red-500 text-center font-bold tracking-[1em] text-sm">
            
            <button onclick="login()" class="w-full bg-red-600 py-3 rounded-xl font-bold uppercase text-xs tracking-widest shadow-lg shadow-red-900/20 active:scale-95 transition-all">
                Autorizovat
            </button>
            <p id="login-error" class="text-red-500 mt-3 text-center text-[9px] font-bold hidden uppercase">Chyba přístupu</p>
        </div>

        <div id="app-screen" class="glass p-6 rounded-2xl w-full max-w-[300px] text-center container-box hidden">
            <h2 class="gym-font text-base font-black uppercase text-red-500 mb-4 italic">Vstup povolen</h2>
            
            <div id="qr-container" class="hidden mb-6">
                <div class="p-3 bg-white rounded-xl inline-block">
                    <div id="qrcode"></div>
                </div>
            </div>

            <button id="buy-btn" onclick="generateTicket()" class="w-full bg-white text-black py-3 rounded-xl font-black uppercase text-xs tracking-wider active:scale-95 transition-all">
                Generovat QR
            </button>
            
            <button onclick="logout()" class="mt-8 text-slate-600 text-[9px] font-bold uppercase tracking-widest">Odhlásit</button>
        </div>
    </main>

    <footer class="p-4 text-center text-[8px] text-slate-700 font-bold uppercase tracking-[0.4em] gym-font">
        Terminal Locked
    </footer>

    <script>
        function login() {
            const pass = document.getElementById('password').value;
            if(pass === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }

        function generateTicket() {
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = "";
            document.getElementById('qr-container').classList.remove('hidden');
            new QRCode(qrDiv, {
                text: "MF-" + Date.now(),
                width: 140,
                height: 140
            });
            const btn = document.getElementById('buy-btn');
            btn.innerText = "AKTIVNÍ";
            btn.disabled = true;
            btn.style.opacity = "0.5";
        }
    </script>
</body>
</html>
